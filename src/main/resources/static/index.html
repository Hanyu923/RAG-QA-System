<!DOCTYPE html>
  <html lang="zh">
  <head>
      <meta charset="UTF-8">
      <title>AI智能助手</title>
      <style>
          body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
          #chatBox { border: 1px solid #ddd; height: 300px; overflow-y: auto; padding: 15px; margin-bottom: 15px;
  border-radius: 8px; background: #fafafa; }
          .user { color: #0066cc; margin-bottom: 10px; }
          .ai { color: #333; background: #e8f5e9; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; display:
  inline-block; }
          input { width: 70%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
          button { padding: 10px 20px; border: none; background: #0066cc; color: white; border-radius: 6px; cursor:
  pointer; }
      </style>
  </head>
  <body>
  <h2>我的AI助手</h2>
  <div id="chatBox"></div>
  <input type="text" id="question" placeholder="输入你的问题..." />
  <button onclick="ask()">发送</button>

  <script>
      function ask() {
          var q = document.getElementById("question").value;
          if (!q) return;

          document.getElementById("chatBox").innerHTML += '<div class="user">你：' + q + '</div>';
          document.getElementById("question").value = '';
          document.getElementById("chatBox").innerHTML += '<div class="ai">AI：思考中...</div>';

          fetch("/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ question: q })
          })
          .then(res => res.text())
          .then(text => {
              var lastAi = document.querySelectorAll(".ai");
              lastAi[lastAi.length-1].innerHTML = "AI：" + text;
          })
          .catch(err => {
              var lastAi = document.querySelectorAll(".ai");
              lastAi[lastAi.length-1].innerHTML = "AI：出错了，请确认后端已启动。";
          });
      }
  </script>
  </body>
  </html>
